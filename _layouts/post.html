---
layout: default
---
<a class="back-link" href="{{ site.url }}{{ site.baseurl }}/">{{ site.theme_config.back_home_text }}</a>
<article>
  <header class="post-header">
    <p class="post-date">{{ page.date | date: site.theme_config.date_format }}</p>
    <h1>{{ page.title }}</h1>
  </header>
  {{ content }}
</article>
